<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>GymTrack</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --surface3: #282828;
  --accent: #d4f547;
  --accent2: #a8c93a;
  --text: #f0f0f0;
  --muted: #888;
  --border: rgba(255,255,255,0.08);
  --danger: #ff4d4d;
  --warning: #ffb347;
  --success: #4dff91;
  --radius: 14px;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); }
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 480px; margin: 0 auto; }

/* NAV BOTTOM */
.nav {
  display: flex;
  padding: 8px 8px calc(8px + var(--safe-bottom));
  background: var(--surface);
  border-top: 1px solid var(--border);
  order: 2;
  flex-shrink: 0;
}
.nav-btn {
  flex: 1; padding: 8px 4px; border: none; background: transparent;
  color: var(--muted); border-radius: 10px; font-family: var(--font-body);
  font-size: 10px; font-weight: 500; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  transition: all 0.15s;
}
.nav-btn.active { background: var(--accent); color: #000; }
.nav-icon { font-size: 20px; }

/* PAGES */
.pages { flex: 1; overflow: hidden; order: 1; position: relative; }
.page { display: none; flex-direction: column; padding: 16px; gap: 14px; overflow-y: auto; height: 100%; -webkit-overflow-scrolling: touch; }
.page.active { display: flex; }

/* HEADER */
.page-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.page-title { font-family: var(--font-display); font-size: 32px; letter-spacing: 1px; color: var(--accent); }
.page-subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }

/* BUTTONS */
.btn { padding: 13px 20px; border-radius: 12px; border: none; font-family: var(--font-body); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; touch-action: manipulation; }
.btn-primary { background: var(--accent); color: #000; width: 100%; }
.btn-primary:active { background: var(--accent2); transform: scale(0.98); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:active { transform: scale(0.98); }
.btn-small { padding: 9px 14px; font-size: 13px; border-radius: 10px; }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-danger { background: rgba(255,77,77,0.15); color: var(--danger); border: 1px solid rgba(255,77,77,0.3); }

/* FORM */
.form-group { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
.form-label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.form-input {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 13px 14px; color: var(--text);
  font-family: var(--font-body); font-size: 16px; outline: none;
  transition: border 0.15s; -webkit-appearance: none;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--muted); }
select.form-input { appearance: none; cursor: pointer; }

/* MUSCLE SELECTOR */
.muscle-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.muscle-btn {
  padding: 10px 4px; border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--surface2); color: var(--text); font-family: var(--font-body);
  font-size: 11px; font-weight: 500; cursor: pointer; text-align: center;
  transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 4px;
  touch-action: manipulation;
}
.muscle-btn.selected { border-color: var(--accent); background: rgba(212,245,71,0.1); color: var(--accent); }
.muscle-emoji { font-size: 20px; }

/* ENERGY */
.energy-row { display: flex; gap: 8px; }
.energy-btn {
  flex: 1; padding: 10px; border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--surface2); cursor: pointer; text-align: center;
  transition: all 0.15s; font-size: 22px; touch-action: manipulation;
}
.energy-btn.selected.fuerte { border-color: var(--success); background: rgba(77,255,145,0.1); }
.energy-btn.selected.normal { border-color: var(--accent); background: rgba(212,245,71,0.1); }
.energy-btn.selected.cansado { border-color: var(--warning); background: rgba(255,179,71,0.1); }
.energy-label { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: var(--font-body); }

/* EXERCISE */
.exercise-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; flex-shrink: 0; }
.exercise-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.exercise-name { font-size: 15px; font-weight: 600; }
.set-row { display: grid; grid-template-columns: 28px 1fr 1fr 36px; gap: 8px; align-items: center; margin-bottom: 8px; }
.set-num { font-size: 13px; color: var(--muted); font-weight: 500; text-align: center; }
.add-set-btn {
  background: var(--surface2); border: 1px dashed var(--border); border-radius: 8px;
  padding: 10px; color: var(--muted); font-size: 13px; cursor: pointer;
  width: 100%; font-family: var(--font-body); touch-action: manipulation;
}
.add-set-btn:active { border-color: var(--accent); color: var(--accent); }
.remove-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 6px; border-radius: 8px; touch-action: manipulation; }
.remove-btn:active { color: var(--danger); }

/* PREV */
.prev-badge { background: rgba(212,245,71,0.08); border: 1px solid rgba(212,245,71,0.25); border-radius: 8px; padding: 7px 10px; font-size: 12px; color: var(--accent); display: flex; align-items: center; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }

/* REC */
.rec-card { border-radius: 10px; padding: 12px; border: 1.5px solid; margin-bottom: 10px; }
.rec-up { background: rgba(77,255,145,0.05); border-color: rgba(77,255,145,0.3); }
.rec-same { background: rgba(212,245,71,0.05); border-color: rgba(212,245,71,0.3); }
.rec-down { background: rgba(255,179,71,0.05); border-color: rgba(255,179,71,0.3); }
.rec-title { font-size: 13px; font-weight: 600; }
.rec-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
.rec-weight { font-family: var(--font-display); font-size: 26px; margin-top: 4px; }
.rec-up .rec-weight { color: var(--success); }
.rec-same .rec-weight { color: var(--accent); }
.rec-down .rec-weight { color: var(--warning); }

/* HISTORY */
.session-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: border 0.15s; flex-shrink: 0; }
.session-card:active { border-color: rgba(212,245,71,0.3); }
.session-date { font-family: var(--font-display); font-size: 20px; color: var(--accent); }
.session-muscle { font-size: 13px; color: var(--muted); margin-top: 2px; }
.session-stats { display: flex; gap: 14px; margin-top: 10px; flex-wrap: wrap; }
.session-stat { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
.session-stat strong { color: var(--text); font-size: 14px; }
.pr-badge { background: rgba(212,245,71,0.15); border-radius: 6px; padding: 2px 8px; font-size: 11px; color: var(--accent); font-weight: 600; }
.exercise-list-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.exercise-list-item:last-child { border-bottom: none; }

/* PROGRESS */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex-shrink: 0; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.stat-value { font-family: var(--font-display); font-size: 28px; color: var(--accent); }
.stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
.mini-chart { display: flex; align-items: flex-end; gap: 4px; height: 60px; padding: 4px 0; }
.chart-bar { flex: 1; border-radius: 4px 4px 0 0; background: var(--accent); opacity: 0.7; min-height: 4px; }
.chart-bar:last-child { opacity: 1; }
.chart-labels { display: flex; justify-content: space-between; }
.chart-label { font-size: 10px; color: var(--muted); }
.pr-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.pr-row:last-child { border-bottom: none; }
.pr-exercise { font-size: 14px; font-weight: 500; }
.pr-muscle { font-size: 11px; color: var(--muted); }
.pr-weight { font-family: var(--font-display); font-size: 22px; color: var(--accent); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: flex-end; justify-content: center; z-index: 200; }
.modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 16px calc(20px + var(--safe-bottom)); width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-family: var(--font-display); font-size: 24px; color: var(--accent); margin-bottom: 16px; }
.hidden { display: none !important; }

/* EMPTY */
.empty { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.empty-desc { font-size: 13px; }

/* Scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">
  <div class="pages">

    <!-- PAGE: REGISTRO -->
    <div id="page-registro" class="page active">
      <div class="page-header">
        <div>
          <div class="page-title">HOY</div>
          <div class="page-subtitle" id="fecha-hoy"></div>
        </div>
        <button class="btn btn-secondary btn-small" onclick="openRutinaModal()">📋 Rutina</button>
      </div>

      <div class="form-group">
        <div class="form-label">Grupo muscular</div>
        <div class="muscle-grid" id="muscle-grid"></div>
      </div>

      <div class="form-group">
        <div class="form-label">Energía de hoy</div>
        <div class="energy-row" id="energy-row">
          <div class="energy-btn fuerte" data-energy="fuerte" onclick="selectEnergy(this)">
            <div>💪</div><div class="energy-label">Fuerte</div>
          </div>
          <div class="energy-btn normal selected normal" data-energy="normal" onclick="selectEnergy(this)">
            <div>😊</div><div class="energy-label">Normal</div>
          </div>
          <div class="energy-btn cansado" data-energy="cansado" onclick="selectEnergy(this)">
            <div>😴</div><div class="energy-label">Cansado</div>
          </div>
        </div>
      </div>

      <div id="exercises-container"></div>

      <button class="btn btn-secondary" onclick="addExercise()">+ Agregar ejercicio</button>

      <div class="form-group">
        <div class="form-label">Notas del día</div>
        <textarea class="form-input" id="session-notes" placeholder="¿Cómo te fue hoy?" rows="2" style="resize:none;"></textarea>
      </div>

      <button class="btn btn-primary" onclick="saveSession()">💾 Guardar entrenamiento</button>
      <div style="height: 8px; flex-shrink:0;"></div>
    </div>

    <!-- PAGE: HISTORIAL -->
    <div id="page-historial" class="page">
      <div class="page-header">
        <div>
          <div class="page-title">HISTORIAL</div>
          <div class="page-subtitle">Tus entrenamientos</div>
        </div>
      </div>
      <div id="historial-list"></div>
      <div style="height: 8px; flex-shrink:0;"></div>
    </div>

    <!-- PAGE: PROGRESO -->
    <div id="page-progreso" class="page">
      <div class="page-header">
        <div>
          <div class="page-title">PROGRESO</div>
          <div class="page-subtitle">Tu evolución</div>
        </div>
      </div>
      <div id="progreso-content"></div>
      <div style="height: 8px; flex-shrink:0;"></div>
    </div>

    <!-- PAGE: RUTINAS -->
    <div id="page-rutinas" class="page">
      <div class="page-header">
        <div>
          <div class="page-title">RUTINAS</div>
          <div class="page-subtitle">Plantillas guardadas</div>
        </div>
        <button class="btn btn-secondary btn-small" onclick="openSaveRutinaModal()">+ Guardar</button>
      </div>
      <div id="rutinas-list"></div>
      <div style="height: 8px; flex-shrink:0;"></div>
    </div>

  </div>

  <!-- NAV -->
  <nav class="nav">
    <button class="nav-btn active" onclick="showPage('registro')">
      <span class="nav-icon">➕</span>Registrar
    </button>
    <button class="nav-btn" onclick="showPage('historial')">
      <span class="nav-icon">📋</span>Historial
    </button>
    <button class="nav-btn" onclick="showPage('progreso')">
      <span class="nav-icon">📊</span>Progreso
    </button>
    <button class="nav-btn" onclick="showPage('rutinas')">
      <span class="nav-icon">🔁</span>Rutinas
    </button>
  </nav>
</div>

<!-- MODAL: Detalle sesión -->
<div id="modal-historial" class="modal-overlay hidden" onclick="closeModal('modal-historial')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div id="modal-historial-content"></div>
  </div>
</div>

<!-- MODAL: Cargar rutina -->
<div id="modal-rutina" class="modal-overlay hidden" onclick="closeModal('modal-rutina')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">Cargar rutina</div>
    <div id="modal-rutina-content"></div>
  </div>
</div>

<!-- MODAL: Guardar rutina -->
<div id="modal-save-rutina" class="modal-overlay hidden" onclick="closeModal('modal-save-rutina')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">Guardar rutina</div>
    <div class="form-group" style="margin-bottom:12px;">
      <div class="form-label">Nombre de la rutina</div>
      <input class="form-input" id="rutina-name-input" placeholder="Ej: Pecho y tríceps" />
    </div>
    <button class="btn btn-primary" onclick="saveRutina()">💾 Guardar rutina actual</button>
  </div>
</div>

<!-- MODAL: Agregar ejercicio -->
<div id="modal-ejercicio" class="modal-overlay hidden" onclick="closeModal('modal-ejercicio')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">Agregar ejercicio</div>
    <div class="form-group" style="margin-bottom:12px;">
      <div class="form-label">Nombre del ejercicio</div>
      <input class="form-input" id="ejercicio-name-input" placeholder="Ej: Press de banca" />
    </div>
    <div class="form-group" style="margin-bottom:16px;">
      <div class="form-label">Máquina / equipo (opcional)</div>
      <input class="form-input" id="ejercicio-equipo-input" placeholder="Ej: Barra libre, mancuernas..." />
    </div>
    <button class="btn btn-primary" onclick="confirmAddExercise()">Agregar ejercicio</button>
  </div>
</div>

<script>
const MUSCLES = [
  { id:'pecho', label:'Pecho', emoji:'🫁' },
  { id:'espalda', label:'Espalda', emoji:'🔙' },
  { id:'piernas', label:'Piernas', emoji:'🦵' },
  { id:'hombros', label:'Hombros', emoji:'🎯' },
  { id:'brazos', label:'Brazos', emoji:'💪' },
  { id:'gluteos', label:'Glúteos', emoji:'🍑' },
  { id:'core', label:'Core', emoji:'⚡' },
  { id:'cardio', label:'Cardio', emoji:'🏃' },
];

let state = {
  sessions: [],
  rutinas: [],
  today: { muscle: '', energy: 'normal', exercises: [], notes: '' }
};

function loadState() {
  try {
    const s = localStorage.getItem('gymtrack_v1');
    if (s) { const p = JSON.parse(s); state.sessions = p.sessions||[]; state.rutinas = p.rutinas||[]; }
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem('gymtrack_v1', JSON.stringify({ sessions: state.sessions, rutinas: state.rutinas })); } catch(e) {}
}

function getLastWeight(name) {
  for (let i = state.sessions.length - 1; i >= 0; i--) {
    const ex = state.sessions[i].exercises.find(e => e.name.toLowerCase() === name.toLowerCase());
    if (ex) {
      const ws = ex.sets.map(s => parseFloat(s.weight)).filter(w => !isNaN(w) && w > 0);
      if (ws.length > 0) return Math.max(...ws);
    }
  }
  return null;
}

function getPR(name) {
  let max = 0;
  state.sessions.forEach(s => {
    const ex = s.exercises.find(e => e.name.toLowerCase() === name.toLowerCase());
    if (ex) ex.sets.forEach(set => { const w = parseFloat(set.weight); if (!isNaN(w) && w > max) max = w; });
  });
  return max > 0 ? max : null;
}

function getRecommendation(lastW, energy) {
  if (!lastW) return null;
  if (energy === 'fuerte') return { type:'up', weight:(lastW+2.5).toFixed(1), title:'¡Sube el peso!', desc:'Estás fuerte. Momento de progresar.' };
  if (energy === 'normal') return { type:'same', weight:lastW.toFixed(1), title:'Mantén el peso', desc:'Consolida la carga anterior.' };
  return { type:'down', weight:Math.max(lastW-2.5,0).toFixed(1), title:'Reduce la carga', desc:'Cuida la técnica hoy.' };
}

function renderMuscleGrid() {
  document.getElementById('muscle-grid').innerHTML = MUSCLES.map(m =>
    `<button class="muscle-btn ${state.today.muscle===m.id?'selected':''}" onclick="selectMuscle('${m.id}')">
      <span class="muscle-emoji">${m.emoji}</span><span>${m.label}</span>
    </button>`
  ).join('');
}

function selectMuscle(id) { state.today.muscle = id; renderMuscleGrid(); }

function selectEnergy(el) {
  document.querySelectorAll('.energy-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  state.today.energy = el.dataset.energy;
  renderExercises();
}

function addExercise() {
  document.getElementById('ejercicio-name-input').value = '';
  document.getElementById('ejercicio-equipo-input').value = '';
  openModal('modal-ejercicio');
  setTimeout(() => document.getElementById('ejercicio-name-input').focus(), 300);
}

function confirmAddExercise() {
  const name = document.getElementById('ejercicio-name-input').value.trim();
  const equipo = document.getElementById('ejercicio-equipo-input').value.trim();
  if (!name) return;
  state.today.exercises.push({ name, equipo, sets: [{ weight: '', reps: '' }] });
  closeModal('modal-ejercicio');
  renderExercises();
}

function renderExercises() {
  const container = document.getElementById('exercises-container');
  if (!state.today.exercises.length) { container.innerHTML = ''; return; }
  container.innerHTML = state.today.exercises.map((ex, ei) => {
    const lastW = getLastWeight(ex.name);
    const pr = getPR(ex.name);
    const rec = getRecommendation(lastW, state.today.energy);
    const isPR = lastW && pr && lastW >= pr;
    let prevHtml = '';
    if (lastW) {
      let recHtml = '';
      if (rec) {
        const cls = rec.type==='up'?'rec-up':rec.type==='same'?'rec-same':'rec-down';
        const icon = rec.type==='up'?'⬆️':rec.type==='same'?'➡️':'⬇️';
        recHtml = `<div class="rec-card ${cls}"><div style="display:flex;align-items:center;gap:6px;"><span>${icon}</span><span class="rec-title">${rec.title}</span></div><div class="rec-desc">${rec.desc}</div><div class="rec-weight">${rec.weight} kg</div></div>`;
      }
      prevHtml = `<div class="prev-badge">🕐 Última vez: <strong>${lastW} kg</strong>${isPR?' &nbsp;<span class="pr-badge">🏆 PR</span>':''}</div>${recHtml}`;
    }
    const setsHtml = ex.sets.map((set, si) =>
      `<div class="set-row">
        <span class="set-num">${si+1}</span>
        <input class="form-input" style="padding:10px;font-size:16px;text-align:center;" type="number" inputmode="decimal" placeholder="kg" value="${set.weight}" oninput="updateSet(${ei},${si},'weight',this.value)" />
        <input class="form-input" style="padding:10px;font-size:16px;text-align:center;" type="number" inputmode="numeric" placeholder="reps" value="${set.reps}" oninput="updateSet(${ei},${si},'reps',this.value)" />
        <button class="remove-btn" onclick="removeSet(${ei},${si})">✕</button>
      </div>`
    ).join('');
    return `<div class="exercise-card">
      <div class="exercise-header">
        <div>
          <div class="exercise-name">${ex.name}</div>
          ${ex.equipo?`<div style="font-size:12px;color:var(--muted);">📍 ${ex.equipo}</div>`:''}
        </div>
        <button class="remove-btn" onclick="removeExercise(${ei})" style="font-size:20px;">🗑</button>
      </div>
      ${prevHtml}
      <div style="margin-bottom:4px;display:grid;grid-template-columns:28px 1fr 1fr 36px;gap:8px;">
        <span></span>
        <span style="font-size:11px;color:var(--muted);text-align:center;">KG</span>
        <span style="font-size:11px;color:var(--muted);text-align:center;">REPS</span>
        <span></span>
      </div>
      ${setsHtml}
      <button class="add-set-btn" onclick="addSet(${ei})">+ Agregar serie</button>
    </div>`;
  }).join('');
}

function updateSet(ei, si, field, value) { state.today.exercises[ei].sets[si][field] = value; }
function addSet(ei) { state.today.exercises[ei].sets.push({ weight:'', reps:'' }); renderExercises(); }
function removeSet(ei, si) { if (state.today.exercises[ei].sets.length > 1) { state.today.exercises[ei].sets.splice(si,1); renderExercises(); } }
function removeExercise(ei) { state.today.exercises.splice(ei,1); renderExercises(); }

function saveSession() {
  if (!state.today.muscle) { alert('Selecciona un grupo muscular'); return; }
  if (!state.today.exercises.length) { alert('Agrega al menos un ejercicio'); return; }
  const filled = state.today.exercises.filter(ex => ex.sets.some(s => s.weight || s.reps));
  if (!filled.length) { alert('Registra al menos un peso o repeticiones'); return; }
  state.sessions.push({
    id: Date.now(),
    date: new Date().toISOString(),
    muscle: state.today.muscle,
    energy: state.today.energy,
    notes: document.getElementById('session-notes').value,
    exercises: JSON.parse(JSON.stringify(state.today.exercises))
  });
  saveState();
  state.today = { muscle:'', energy:'normal', exercises:[], notes:'' };
  renderMuscleGrid();
  renderExercises();
  document.getElementById('session-notes').value = '';
  document.querySelectorAll('.energy-btn').forEach(b => { b.classList.remove('selected'); if(b.dataset.energy==='normal') b.classList.add('selected'); });
  showPage('historial');
}

function renderHistorial() {
  const list = document.getElementById('historial-list');
  if (!state.sessions.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Sin entrenamientos aún</div><div class="empty-desc">Registra tu primer entrenamiento</div></div>`;
    return;
  }
  list.innerHTML = [...state.sessions].reverse().map(s => {
    const d = new Date(s.date);
    const label = d.toLocaleDateString('es-ES', { weekday:'short', day:'numeric', month:'short' });
    const muscle = MUSCLES.find(m => m.id === s.muscle);
    const totalSets = s.exercises.reduce((a,e) => a+e.sets.length, 0);
    const maxW = s.exercises.reduce((a,e) => Math.max(a,...e.sets.map(s=>parseFloat(s.weight)||0)), 0);
    const eIcon = s.energy==='fuerte'?'💪':s.energy==='cansado'?'😴':'😊';
    return `<div class="session-card" style="margin-bottom:10px;" onclick="openSession(${s.id})">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div class="session-date">${label.toUpperCase()}</div>
        <span style="font-size:20px;">${eIcon}</span>
      </div>
      <div class="session-muscle">${muscle?muscle.emoji+' '+muscle.label:s.muscle}</div>
      <div class="session-stats">
        <div class="session-stat">🏋️ <strong>${s.exercises.length}</strong> ejercicios</div>
        <div class="session-stat">🔢 <strong>${totalSets}</strong> series</div>
        ${maxW>0?`<div class="session-stat">⚡ <strong>${maxW}kg</strong></div>`:''}
      </div>
    </div>`;
  }).join('');
}

function openSession(id) {
  const s = state.sessions.find(s => s.id === id);
  if (!s) return;
  const d = new Date(s.date);
  const label = d.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' });
  const muscle = MUSCLES.find(m => m.id === s.muscle);
  document.getElementById('modal-historial-content').innerHTML = `
    <div class="modal-title">${label.toUpperCase()}</div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:14px;">${muscle?muscle.emoji+' '+muscle.label:s.muscle}</div>
    ${s.exercises.map(ex => {
      const bestW = Math.max(...ex.sets.map(s=>parseFloat(s.weight)||0));
      const pr = getPR(ex.name);
      const isPR = pr && bestW >= pr && bestW > 0;
      return `<div class="exercise-card" style="margin-bottom:10px;">
        <div style="font-size:15px;font-weight:600;margin-bottom:8px;">${ex.name} ${isPR?'<span class="pr-badge">🏆 PR</span>':''}</div>
        ${ex.equipo?`<div style="font-size:12px;color:var(--muted);margin-bottom:8px;">📍 ${ex.equipo}</div>`:''}
        ${ex.sets.map((set,i)=>`<div class="exercise-list-item"><span style="color:var(--muted)">Serie ${i+1}</span><span>${set.weight||'—'} kg × ${set.reps||'—'} reps</span></div>`).join('')}
      </div>`;
    }).join('')}
    ${s.notes?`<div class="card" style="margin-top:4px;"><div style="font-size:12px;color:var(--muted);margin-bottom:4px;">NOTAS</div><div style="font-size:14px;">${s.notes}</div></div>`:''}
    <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-secondary btn-small" onclick="repeatSession(${id})">🔁 Repetir rutina</button>
      <button class="btn btn-danger btn-small" onclick="deleteSession(${id})">🗑 Eliminar</button>
    </div>`;
  openModal('modal-historial');
}

function deleteSession(id) {
  if (!confirm('¿Eliminar este entrenamiento?')) return;
  state.sessions = state.sessions.filter(s => s.id !== id);
  saveState(); closeModal('modal-historial'); renderHistorial();
}

function repeatSession(id) {
  const s = state.sessions.find(s => s.id === id);
  if (!s) return;
  state.today.muscle = s.muscle;
  state.today.exercises = s.exercises.map(e => ({ name:e.name, equipo:e.equipo, sets:[{weight:'',reps:''}] }));
  closeModal('modal-historial'); showPage('registro');
}

function renderProgreso() {
  const content = document.getElementById('progreso-content');
  if (!state.sessions.length) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Sin datos aún</div><div class="empty-desc">Registra entrenamientos para ver tu progreso</div></div>`;
    return;
  }
  const totalSessions = state.sessions.length;
  const totalExercises = state.sessions.reduce((a,s) => a+s.exercises.length, 0);
  const totalSets = state.sessions.reduce((a,s) => a+s.exercises.reduce((b,e)=>b+e.sets.length,0), 0);
  const totalWeight = state.sessions.reduce((a,s) => a+s.exercises.reduce((b,e)=>b+e.sets.reduce((c,set)=>c+(parseFloat(set.weight)||0)*(parseFloat(set.reps)||1),0),0), 0);
  const allEx = {};
  state.sessions.forEach(s => s.exercises.forEach(ex => {
    if (!allEx[ex.name]) allEx[ex.name] = { muscle:s.muscle, pr:0 };
    ex.sets.forEach(set => { const w=parseFloat(set.weight)||0; if(w>allEx[ex.name].pr) allEx[ex.name].pr=w; });
  }));
  const prs = Object.entries(allEx).filter(([n,d])=>d.pr>0).sort((a,b)=>b[1].pr-a[1].pr);
  const last7 = state.sessions.slice(-7);
  const chartMax = Math.max(...last7.map(s=>s.exercises.reduce((a,e)=>Math.max(a,...e.sets.map(s=>parseFloat(s.weight)||0)),0)),1);
  content.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value">${totalSessions}</div><div class="stat-label">Sesiones totales</div></div>
      <div class="stat-card"><div class="stat-value">${totalSets}</div><div class="stat-label">Series totales</div></div>
      <div class="stat-card"><div class="stat-value">${totalExercises}</div><div class="stat-label">Ejercicios</div></div>
      <div class="stat-card"><div class="stat-value">${(totalWeight/1000).toFixed(1)}t</div><div class="stat-label">Tonelaje total</div></div>
    </div>
    ${last7.length>1?`<div class="card">
      <div style="font-size:13px;font-weight:500;margin-bottom:12px;">Peso máximo — últimas sesiones</div>
      <div class="mini-chart">${last7.map(s=>{const mw=s.exercises.reduce((a,e)=>Math.max(a,...e.sets.map(s=>parseFloat(s.weight)||0)),0);const h=Math.max((mw/chartMax)*56,4);return`<div class="chart-bar" style="height:${h}px;" title="${mw}kg"></div>`;}).join('')}</div>
      <div class="chart-labels">${last7.map(s=>{const d=new Date(s.date);return`<span class="chart-label">${d.toLocaleDateString('es-ES',{weekday:'narrow'})}</span>`;}).join('')}</div>
    </div>`:''}
    ${prs.length?`<div class="card">
      <div style="font-size:13px;font-weight:500;margin-bottom:12px;">🏆 Récords personales</div>
      ${prs.slice(0,8).map(([name,data])=>{const m=MUSCLES.find(m=>m.id===data.muscle);return`<div class="pr-row"><div><div class="pr-exercise">${name}</div><div class="pr-muscle">${m?m.emoji+' '+m.label:data.muscle}</div></div><div class="pr-weight">${data.pr} <span style="font-size:14px;color:var(--muted);">kg</span></div></div>`;}).join('')}
    </div>`:''}`;
}

function renderRutinas() {
  const list = document.getElementById('rutinas-list');
  if (!state.rutinas.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🔁</div><div class="empty-title">Sin rutinas guardadas</div><div class="empty-desc">Añade ejercicios y guarda tu rutina</div></div>`;
    return;
  }
  list.innerHTML = state.rutinas.map((r,ri) => {
    const muscle = MUSCLES.find(m=>m.id===r.muscle);
    return `<div class="session-card" style="margin-bottom:10px;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div style="font-size:16px;font-weight:600;">${r.name}</div>
        <button class="remove-btn" onclick="deleteRutina(${ri})">🗑</button>
      </div>
      <div class="session-muscle" style="margin-top:4px;">${muscle?muscle.emoji+' '+muscle.label:r.muscle}</div>
      <div style="margin-top:6px;font-size:13px;color:var(--muted);">${r.exercises.map(e=>e.name).join(' · ')}</div>
      <div style="margin-top:12px;"><button class="btn btn-primary btn-small" onclick="loadRutina(${ri})">▶ Cargar rutina</button></div>
    </div>`;
  }).join('');
}

function openSaveRutinaModal() {
  if (!state.today.exercises.length) { alert('Agrega ejercicios primero'); return; }
  document.getElementById('rutina-name-input').value = '';
  openModal('modal-save-rutina');
}

function saveRutina() {
  const name = document.getElementById('rutina-name-input').value.trim();
  if (!name) return;
  state.rutinas.push({ name, muscle:state.today.muscle, exercises:state.today.exercises.map(e=>({name:e.name,equipo:e.equipo,sets:[{weight:'',reps:''}]})) });
  saveState(); closeModal('modal-save-rutina'); renderRutinas();
}

function deleteRutina(ri) {
  if (!confirm('¿Eliminar esta rutina?')) return;
  state.rutinas.splice(ri,1); saveState(); renderRutinas();
}

function loadRutina(ri) {
  const r = state.rutinas[ri];
  state.today.muscle = r.muscle;
  state.today.exercises = r.exercises.map(e=>({name:e.name,equipo:e.equipo,sets:[{weight:'',reps:''}]}));
  renderMuscleGrid(); renderExercises();
  closeModal('modal-rutina'); showPage('registro');
}

function openRutinaModal() {
  const content = document.getElementById('modal-rutina-content');
  if (!state.rutinas.length) {
    content.innerHTML = `<div class="empty" style="padding:20px 0;"><div class="empty-desc">No tienes rutinas guardadas aún.</div></div>`;
  } else {
    content.innerHTML = state.rutinas.map((r,ri) => {
      const muscle = MUSCLES.find(m=>m.id===r.muscle);
      return `<div class="session-card" style="margin-bottom:10px;" onclick="loadRutina(${ri})">
        <div style="font-size:15px;font-weight:600;">${r.name}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px;">${muscle?muscle.emoji+' '+muscle.label:r.muscle}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px;">${r.exercises.map(e=>e.name).join(', ')}</div>
      </div>`;
    }).join('');
  }
  openModal('modal-rutina');
}

function showPage(page) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  const pages = ['registro','historial','progreso','rutinas'];
  document.querySelectorAll('.nav-btn')[pages.indexOf(page)]?.classList.add('active');
  if (page==='historial') renderHistorial();
  if (page==='progreso') renderProgreso();
  if (page==='rutinas') renderRutinas();
}

function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

function init() {
  loadState();
  document.getElementById('fecha-hoy').textContent = new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  renderMuscleGrid();
  renderExercises();
}

init();
</script>
</body>
</html>
